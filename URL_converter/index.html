<html>
	<head>
		<meta charset="utf-8">
		<meta name="description" content="IES - Shiny URL Converter">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="apple-mobile-web-app-title" content="IES">
		<meta name="application-name" content="IES">
		<meta name="mobile-web-app-capable" content="yes">
		<link rel="apple-touch-icon" sizes="57x57" href="../img/favicon/apple-touch-icon-57x57.png">
		<link rel="apple-touch-icon" sizes="114x114" href="../img/favicon/apple-touch-icon-114x114.png">
		<link rel="apple-touch-icon" sizes="72x72" href="../img/favicon/apple-touch-icon-72x72.png">
		<link rel="apple-touch-icon" sizes="144x144" href="../img/favicon/apple-touch-icon-144x144.png">
		<link rel="apple-touch-icon" sizes="60x60" href="../img/favicon/apple-touch-icon-60x60.png">
		<link rel="apple-touch-icon" sizes="120x120" href="../img/favicon/apple-touch-icon-120x120.png">
		<link rel="apple-touch-icon" sizes="76x76" href="../img/favicon/apple-touch-icon-76x76.png">
		<link rel="apple-touch-icon" sizes="152x152" href="../img/favicon/apple-touch-icon-152x152.png">

		<link type="text/css" rel="stylesheet" href="../css/style.css">
		<title>IES: Shiny URL Converter</title>
		<style>
			.converter-wrap {
				max-width: 600px;
				margin: 20px auto;
				padding: 24px 20px;
				text-align: left;
				background: #1a1a1a;
				border: 1px solid #2c2c2c;
				border-radius: 12px;
			}
			.converter-header {
				border-left: 3px solid #FF9900;
				border-radius: 6px;
				padding-left: 12px;
				margin-bottom: 20px;
			}
			.converter-title {
				font-size: 20px;
				font-weight: bold;
				color: #FF9900;
				margin-bottom: 4px;
			}
			.converter-subtitle {
				font-size: 12px;
				color: #888;
				line-height: 1.5;
			}
			.converter-subtitle a { color: #FF9900; }
			.converter-label {
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				color: #999;
				margin-bottom: 6px;
				display: block;
			}
			#input-area {
				width: 100%;
				box-sizing: border-box;
				background-color: #111;
				color: #f3f3f3;
				border: 1px solid #333;
				border-radius: 6px;
				padding: 10px 12px;
				font-family: "Courier New", Courier, monospace;
				font-size: 12px;
				line-height: 1.5;
				resize: vertical;
				min-height: 90px;
				margin-bottom: 10px;
			}
			#input-area:focus {
				outline: none;
				border-color: #005387;
				box-shadow: 0 0 0 3px rgba(0,83,135,0.2);
			}
			.status-indicator {
				display: flex;
				align-items: center;
				gap: 7px;
				font-size: 11px;
				color: #999;
				margin-bottom: 10px;
				min-height: 16px;
			}
			.status-dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: #444;
				flex-shrink: 0;
				transition: background 0.3s;
			}
			.status-dot.ready  { background: #4caf50; }
			.status-dot.busy   { background: #FF9900; }
			.status-dot.error  { background: #f44336; }
			.convert-btn {
				display: block;
				width: 100%;
				padding: 11px;
				font-size: 14px;
				font-family: Arial, sans-serif;
				font-weight: bold;
				letter-spacing: 0.3px;
				border-radius: 6px;
				border: none;
				cursor: pointer;
				background: #005387;
				color: #ffffff;
				margin-bottom: 16px;
				transition: background 0.15s;
			}
			.convert-btn:hover   { background: #006ab5; }
			.convert-btn:active  { background: #004070; }
			.convert-btn:disabled { background: #1c3448; color: #555; cursor: default; }
			#output-section { display: none; }
			.output-label {
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				color: #999;
				margin-bottom: 6px;
			}
			.output-url-box {
				background: #111;
				border: 1px solid #2a2a2a;
				border-left: 3px solid #005387;
				border-radius: 6px;
				padding: 10px 12px;
				font-family: "Courier New", Courier, monospace;
				font-size: 12px;
				line-height: 1.5;
				word-break: break-all;
				color: #c8d8e8;
				margin-bottom: 12px;
				display: flex;
				align-items: flex-start;
				gap: 10px;
			}
			.output-url-text { flex: 1; }
			.copy-btn {
				flex-shrink: 0;
				padding: 3px 10px;
				font-size: 11px;
				border-radius: 4px;
				border: 1px solid #3a3a3a;
				background: transparent;
				color: #777;
				cursor: pointer;
				white-space: nowrap;
				transition: all 0.1s;
			}
			.copy-btn:hover { background: #222; color: #bbb; border-color: #555; }
			.open-btn {
				display: inline-block;
				padding: 8px 20px;
				border-radius: 5px;
				border: none;
				background: #005387;
				color: #ffffff;
				font-family: Arial, sans-serif;
				font-size: 13px;
				font-weight: bold;
				cursor: pointer;
				text-decoration: none;
				margin-bottom: 14px;
				transition: background 0.15s;
			}
			.open-btn:hover { background: #006ab5; }
			.kind-badge {
				display: inline-block;
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: #999;
				border: 1px solid #3a3a3a;
				border-radius: 3px;
				padding: 1px 6px;
				margin-bottom: 10px;
				cursor: default;
				user-select: none;
			}
			.notes-box {
				background: #111;
				border: 1px solid #222;
				border-radius: 6px;
				padding: 12px 14px;
				margin-bottom: 10px;
			}
			.notes-title {
				font-size: 10px;
				font-weight: bold;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				color: #999;
				margin-bottom: 8px;
			}
			.notes-list {
				margin: 0;
				padding: 0 0 0 16px;
				font-size: 12px;
				color: #777;
				line-height: 1.7;
			}
			.error-box {
				background: #180a0a;
				border: 1px solid #3a1818;
				border-left: 3px solid #c94040;
				border-radius: 6px;
				padding: 10px 14px;
				color: #ff8888;
				font-size: 12px;
				line-height: 1.6;
				margin-bottom: 10px;
			}
			.warning-box {
				background: #161200;
				border: 1px solid #3a3000;
				border-left: 3px solid #cc9900;
				border-radius: 6px;
				padding: 10px 14px;
				color: #d4a800;
				font-size: 12px;
				line-height: 1.6;
				margin-bottom: 10px;
			}
			.URL_Converter .footer {
				display: flex;
				align-items: center;
				justify-content: center;
				max-width: none;
				transform: none;
			}
			.URL_Converter .footer p {
				margin: 0;
			}
			.URL_Converter .footer #version {
				position: absolute;
				left: 0;
				right: 0;
				top: 50px;
				display: block;
				font-size: 12px;
				line-height: 1;
				margin: 0;
				color: #888;
			}
			.URL_Converter .content {
				padding-bottom: 50px;
			}
			@supports (-webkit-touch-callout: none) {
				.URL_Converter .footer {
					height: 32px;
				}
				.URL_Converter .content {
					padding-bottom: 80px;
				}
			}
		</style>
	</head>
	<body class="URL_Converter">
		<div class="wrapper">
			<div class="header"></div>
			<div class="content">
				<div class="converter-wrap">
					<div class="converter-header">
						<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
							<a href="https://www.innoengserv.com" target="_blank" rel="noopener"><img src="../img/IES_logo.svg" alt="IES" class="filter-white" style="height:36px;width:auto;"></a>
							<div class="converter-title">Shiny URL Converter</div>
						</div>
						<div class="converter-subtitle">Convert legacy <a href="https://rplus.github.io/pokemongo-shiny/" target="_blank" rel="noopener">pokemongo-shiny</a> or classic <a href="https://rplus.github.io/Pokemon-shiny/" target="_blank" rel="noopener">Pokemon-shiny</a> URLs to the current format</div>
					</div>

					<label class="converter-label" for="input-area">Paste old URL, TinyURL, or legacy status string</label>
					<textarea id="input-area" placeholder="https://tinyurl.com/... or https://rplus.github.io/pokemongo-shiny/?status=00012... or a raw digit string"></textarea>

					<div id="status-indicator" class="status-indicator">
						<span class="status-dot" id="status-dot"></span>
						<span id="status-text">Loading data...</span>
					</div>

					<button class="convert-btn" id="convert-btn" disabled>Convert</button>

					<div id="output-section">
						<div id="error-area"></div>
						<div id="result-area"></div>
					</div>
				</div>
			</div>
			<div class="footer">
				<p>&copy;2026 <input type="image" alt="Bart" src="../img/BartmanEH.png" class="footer_img" style="height:30px;">Stassen, P.Eng.</p>
				<span id="version">v1.3b</span>
			</div>
		</div>

		<script type="module">
			import {
				parseUserInput,
				convertLegacyStatus,
				convertClassicUrl,
				buildMigrationNotes,
				buildClassicMigrationNotes,
			} from "./converter.js";

			let mapping = null;
			let crosswalk = null;

			const statusDot  = document.getElementById("status-dot");
			const statusText = document.getElementById("status-text");
			const convertBtn = document.getElementById("convert-btn");
			const outputSection = document.getElementById("output-section");
			const errorArea = document.getElementById("error-area");
			const resultArea = document.getElementById("result-area");

			function setStatus(text, state = "idle") {
				statusText.textContent = text;
				statusDot.className = "status-dot" + (state !== "idle" ? " " + state : "");
			}

			async function loadData() {
				try {
					const [mappingRes, crosswalkRes] = await Promise.all([
						fetch("./data/current-mapping.json"),
						fetch("./data/classic-crosswalk.json"),
					]);
					if (!mappingRes.ok) throw new Error(`current-mapping.json: HTTP ${mappingRes.status}`);
					if (!crosswalkRes.ok) throw new Error(`classic-crosswalk.json: HTTP ${crosswalkRes.status}`);
					mapping = await mappingRes.json();
					crosswalk = await crosswalkRes.json();
					setStatus(`Snapshot ${mapping.meta?.effectiveDate ?? "unknown"} · ${mapping.rows?.length?.toLocaleString() ?? "?"} rows`, "ready");
					convertBtn.disabled = false;
				} catch (err) {
					setStatus("Failed to load data: " + err.message, "error");
				}
			}

			document.getElementById("input-area").addEventListener("focus", () => {
				if (outputSection.style.display !== "none") {
					document.getElementById("input-area").value = "";
					outputSection.style.display = "none";
					errorArea.innerHTML = "";
					resultArea.innerHTML = "";
				}
			});

			document.getElementById("input-area").addEventListener("keydown", (e) => {
				if (e.key === "Enter" && !e.shiftKey && !convertBtn.disabled) {
					e.preventDefault();
					convertBtn.click();
				}
			});

			convertBtn.addEventListener("click", async () => {
				const raw = document.getElementById("input-area").value;
				errorArea.innerHTML = "";
				resultArea.innerHTML = "";
				outputSection.style.display = "block";

				convertBtn.disabled = true;
				convertBtn.textContent = "Converting...";

				try {
					await runConversion(raw);
				} finally {
					convertBtn.disabled = false;
					convertBtn.textContent = "Convert";
				}
			});

			function decodeEntities(str) {
				// Run until stable so double-encoded &amp;amp; → &amp; → & is fully resolved
				let prev;
				do {
					prev = str;
					str = str
						.replace(/&amp;/g, "&")
						.replace(/&lt;/g, "<")
						.replace(/&gt;/g, ">")
						.replace(/&quot;/g, '"');
				} while (str !== prev);
				return str;
			}

			async function runConversion(raw) {
				raw = decodeEntities(raw.trim());

				// Decode percent-encoded query strings — happens when a URL shortener or proxy
				// encodes ? and & before redirecting (%3F → ?, %26 → &, %3D → =)
				raw = raw.replace(/https?:\/\/\S+/gi, (urlMatch) => {
					if (/%3F/i.test(urlMatch)) {
						try { return decodeURIComponent(urlMatch); } catch {}
					}
					return urlMatch;
				});

				let parsed;
				try {
					parsed = parseUserInput(raw, "Shiny Checklist", "auto");
				} catch (err) {
					showError(err.message);
					return;
				}

				if (parsed.kind === "short-url") {
					setStatus("Resolving via proxy...", "busy");
					let resolved = null;

					try {
						resolved = await resolveViaProxy(parsed.source);
					} catch (proxyErr) {
						if (proxyErr && proxyErr.kind === "proxy-auth") {
							showProxyAuthHint(proxyErr.proxyUrl);
						} else {
							const previewUrl = tinyUrlPreview(parsed.source);
							if (previewUrl) {
								showShortUrlHint(parsed.source, previewUrl);
							} else {
								showWarning(proxyErr.message || "Could not resolve short URL.");
							}
						}
						setStatus(`Snapshot ${mapping.meta?.effectiveDate ?? "unknown"}`, "ready");
						return;
					}

					setStatus("Resolved — parsing...", "busy");
					resolved = decodeEntities(resolved);
					if (/%3F/i.test(resolved)) {
						try { resolved = decodeURIComponent(resolved); } catch {}
					}
					try {
						parsed = parseUserInput(resolved, parsed.fallbackName, "long-url");
					} catch (err) {
						showError(err.message);
						return;
					}
					setStatus(`Snapshot ${mapping.meta?.effectiveDate ?? "unknown"}`, "ready");
				}

				if (parsed.kind === "grouped-status") {
					const newUrl = `https://rplus.github.io/pokemongo-shiny/?name=${encodeURIComponent(parsed.name)}&status=${encodeURIComponent(parsed.status)}`;
					showResult({
						badge: "Already grouped",
						url: newUrl,
						notes: ["This URL is already in the current grouped format — no conversion needed."],
					});
					return;
				}

				if (parsed.kind === "legacy-status") {
					let result;
					try {
						result = convertLegacyStatus({ status: parsed.status, name: parsed.name, mapping });
					} catch (err) {
						showError(err.message);
						return;
					}
					const notes = buildMigrationNotes(result, mapping);
					showResult({ badge: "Legacy flat status", url: result.newUrl, notes });
					return;
				}

				if (parsed.kind === "classic-url") {
					let result;
					try {
						result = convertClassicUrl({ legacyEntries: parsed.legacyEntries, name: parsed.name, mapping, crosswalk });
					} catch (err) {
						showError(err.message);
						return;
					}
					const notes = buildClassicMigrationNotes(result, mapping, crosswalk);
					showResult({ badge: "Classic Pokemon-shiny URL", url: result.newUrl, notes });
					return;
				}

				showError("Unrecognised input kind: " + parsed.kind);
			}

			function showError(message) {
				errorArea.innerHTML = `<div class="error-box">${escHtml(message)}</div>`;
			}

			function showWarning(message) {
				errorArea.innerHTML = `<div class="warning-box">${escHtml(message)}</div>`;
			}

			const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";

			async function resolveViaProxy(shortUrl) {
				const controller = new AbortController();
				const timeoutId = setTimeout(() => controller.abort(), 5_000);
				let response;
				try {
					response = await fetch(CORS_PROXY + shortUrl, {
						redirect: "follow",
						cache: "no-store",
						signal: controller.signal,
					});
				} catch (err) {
					clearTimeout(timeoutId);
					if (err.name === "AbortError") throw new Error("Proxy timed out after 5 s.");
					throw new Error("Proxy unreachable: " + err.message);
				}
				clearTimeout(timeoutId);

				if (response.status === 403) {
					throw { kind: "proxy-auth", proxyUrl: CORS_PROXY + "corsdemo" };
				}
				if (!response.ok) {
					throw new Error(`Proxy returned HTTP ${response.status}.`);
				}

				// cors-anywhere rewrites redirect Location headers to pass through itself,
				// so the final response.url is CORS_PROXY + <actual destination URL>.
				let finalUrl = response.url;
				if (finalUrl.startsWith(CORS_PROXY)) {
					finalUrl = finalUrl.slice(CORS_PROXY.length);
				}
				if (!finalUrl || finalUrl === shortUrl) {
					throw new Error("Proxy resolved but destination URL could not be determined.");
				}
				return finalUrl;
			}

			function showProxyAuthHint(proxyUrl) {
				errorArea.innerHTML = `
					<div class="warning-box">
						<strong>One-time proxy access required</strong><br><br>
						The CORS proxy needs a quick one-time approval before it can expand short URLs.
						<div style="margin-top:10px;">
							<a href="${escAttr(proxyUrl)}" target="_blank" rel="noopener" class="open-btn" style="font-size:13px;padding:6px 16px;">Request temporary access &rarr;</a>
						</div>
						<div style="margin-top:10px;font-size:11px;color:#aaaaaa;">
							Click the button above and then click <em>"Request temporary access to the demo server"</em>, then come back and click Convert again.
						</div>
					</div>
				`;
			}

			function tinyUrlPreview(shortUrl) {
				try {
					const u = new URL(shortUrl);
					if (u.hostname === "tinyurl.com" || u.hostname === "www.tinyurl.com") {
						return "https://preview.tinyurl.com" + u.pathname;
					}
				} catch {}
				return null;
			}

			function showShortUrlHint(shortUrl, previewUrl) {
				errorArea.innerHTML = `
					<div class="warning-box">
						<strong>Could not expand automatically</strong> — use the TinyURL preview page to see the full destination URL before any JavaScript strips it.<br><br>
						<a href="${escAttr(previewUrl)}" target="_blank" rel="noopener" class="open-btn" style="font-size:13px;padding:6px 16px;">Open TinyURL preview &rarr;</a>
						<div style="margin-top:10px;font-size:11px;color:#888;">Copy the full URL from that page, then click back here to paste it and convert.</div>
					</div>
				`;
			}

			function showResult({ badge, url, notes }) {
				const noteItems = notes.map((n) => `<li>${escHtml(n)}</li>`).join("");
				resultArea.innerHTML = `
					<div class="kind-badge">${escHtml(badge)}</div>
					<div class="output-label">Converted URL</div>
					<div class="output-url-box">
						<span class="output-url-text" id="converted-url">${escHtml(url)}</span>
						<button class="copy-btn" id="copy-btn">Copy</button>
					</div>
					<a class="open-btn" href="${escAttr(url)}" target="_blank" rel="noopener">Open in new tab</a>
					<div class="warning-box" style="margin-bottom:12px;">
						<strong>Verify your results</strong> — the conversion uses a data snapshot from April 28, 2026. Shiny forms released after that date are not in the snapshot and will be silently dropped from the conversion. Check your collection manually after importing.
					</div>
					<div class="notes-box">
						<div class="notes-title">Migration notes</div>
						<ul class="notes-list">${noteItems}</ul>
					</div>
				`;
				document.getElementById("copy-btn").addEventListener("click", () => {
					navigator.clipboard.writeText(url).then(() => {
						const btn = document.getElementById("copy-btn");
						if (btn) { btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = "Copy"; }, 1500); }
					});
				});
			}

			function escHtml(str) {
				return String(str)
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;")
					.replace(/"/g, "&quot;");
			}

			function escAttr(str) {
				return String(str).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
			}

			loadData();
		</script>
	</body>
</html>
